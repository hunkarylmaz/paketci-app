# ===========================================
# RESTORAN PANEL - isletme.paketciniz.com
# ===========================================
server {
    listen 80;
    server_name isletme.paketciniz.com;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name isletme.paketciniz.com;
    
    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/paketciniz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paketciniz.com/privkey.pem;
    
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # Restaurant Portal (React/Vite)
    location / {
        proxy_pass http://partner_portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Portal-Type "restaurant";
        
        # SPA support
        try_files $uri $uri/ /index.html;
    }
    
    # Static assets
    location /assets {
        proxy_pass http://partner_portal/assets;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # API proxy
    location /api/ {
        proxy_pass http://backend_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Portal-Type "restaurant";
    }
}
