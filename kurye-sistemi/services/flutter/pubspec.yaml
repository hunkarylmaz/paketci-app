name: paketci_courier
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  
  # Location
  geolocator: ^10.1.0
  location: ^5.0.3
  
  # WebSocket
  web_socket_channel: ^2.4.0
  
  # HTTP
  dio: ^5.4.0
  http: ^1.1.0
  
  # State Management
  provider: ^6.1.1
  
  # UI
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0
  
  # Permissions
  permission_handler: ^11.1.0
  
  # Phone State (Caller ID)
  flutter_phone_state: ^1.0.0
  
  # Local Notifications
  flutter_local_notifications: ^16.3.0
  
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.2.2
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/