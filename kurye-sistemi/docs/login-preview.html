<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paketçi - Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .gradient-bg { 
            background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 50%, #60A5FA 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(30, 64, 175, 0.4);
        }
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .input-focus:focus {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-5xl flex items-center gap-12">
        <!-- Left Side - Branding -->
        <div class="flex-1 text-white hidden lg:block">
            <div class="floating">
                <div class="w-20 h-20 bg-white/20 backdrop-blur rounded-2xl flex items-center justify-center mb-8">
                    <span class="text-4xl font-bold">P</span>
                </div>
                <h1 class="text-5xl font-bold mb-6">Paketçi</h1>
                <p class="text-xl text-blue-100 mb-8">Profesyonel kurye yönetim sistemi ile teslimatlarınızı takip edin.</p>
                
                <div class="space-y-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                            <i class="fas fa-motorcycle"></i>
                        </div>
                        <span>Akıllı kurye atama</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <span>Gerçek zamanlı takip</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                            <i class="fas fa-file-excel"></i>
                        </div>
                        <span>Detaylı raporlama</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Right Side - Login Form -->
        <div class="flex-1 w-full max-w-md">
            <div class="glass rounded-3xl p-8">
                <!-- Mobile Logo -->
                <div class="lg:hidden text-center mb-8">
                    <div class="w-16 h-16 bg-gradient-to-br from-blue-600 to-blue-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <span class="text-2xl font-bold text-white">P</span>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800">Paketçi</h2>
                </div>
                
                <h3 class="text-2xl font-bold text-gray-800 mb-2">Hoş Geldiniz</h3>
                <p class="text-gray-500 mb-8">Hesabınıza giriş yapın</p>
                
                <form class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">E-posta</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="email" placeholder="ornek@firma.com" 
                                class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 input-focus transition">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Şifre</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="password" placeholder="••••••••" 
                                class="w-full pl-12 pr-12 py-4 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 input-focus transition">
                            <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-5 h-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                            <span class="text-sm text-gray-600">Beni hatırla</span>
                        </label>
                        <a href="#" class="text-sm text-blue-600 hover:text-blue-700 font-medium">Şifremi unuttum</a>
                    </div>
                    
                    <button type="submit" 
                        class="w-full py-4 bg-gradient-to-r from-blue-600 to-blue-500 text-white font-semibold rounded-xl hover:from-blue-700 hover:to-blue-600 transition shadow-lg shadow-blue-500/30">
                        Giriş Yap
                    </button>
                </form>
                
                <div class="mt-8 pt-6 border-t border-gray-100">
                    <p class="text-center text-gray-500 text-sm mb-4">veya şununla devam et</p>
                    <div class="flex gap-3">
                        <button class="flex-1 py-3 border border-gray-200 rounded-xl hover:bg-gray-50 transition flex items-center justify-center gap-2">
                            <i class="fab fa-google text-red-500"></i>
                            <span class="text-sm font-medium">Google</span>
                        </button>
                        <button class="flex-1 py-3 border border-gray-200 rounded-xl hover:bg-gray-50 transition flex items-center justify-center gap-2">
                            <i class="fab fa-apple text-gray-800"></i>
                            <span class="text-sm font-medium">Apple</span>
                        </button>
                    </div>
                </div>
                
                <p class="text-center text-gray-500 text-sm mt-6">
                    Hesabınız yok mu? 
                    <a href="#" class="text-blue-600 font-medium hover:text-blue-700">Kayıt olun</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
